function getEnding(impacts) {
  const c = {};
  impacts.forEach(k => { c[k] = (c[k] || 0) + 1; });
  const top = Object.entries(c).sort((a, b) => b[1] - a[1])[0];
  return ENDINGS[top?.[0]] || ENDINGS.default;
}

function useTypewriter(text, speed = 30, active = true) {
  const [idx, setIdx] = useState(0);
  const [done, setDone] = useState(false);
  useEffect(() => {
    setIdx(0); setDone(false);
    if (!text) return;
    if (!active) { setIdx(text.length); setDone(true); return; }
    let i = 0;
    const t = setInterval(() => {
      i++; setIdx(i);
      if (i >= text.length) { clearInterval(t); setDone(true); }
    }, speed);
    return () => clearInterval(t);
  }, [text, active, speed]);
  return { displayed: text?.slice(0, idx) || "", done };
}

function useCountdown(from, active) {
  const [val, setVal] = useState(from);
  useEffect(() => {
    if (!active) return;
    const t = setInterval(() => setVal(v => v > 0 ? v - 1 : 0), 80);
    return () => clearInterval(t);
  }, [active]);
  return val;
}

function Cursor({ color = "#c8102e" }) {
  const [v, setV] = useState(true);
  useEffect(() => { const t = setInterval(() => setV(x => !x), 500); return () => clearInterval(t); }, []);
  return <span style={{color, opacity: v ? 1 : 0, userSelect: "none"}}>▌</span>;
}

      <div style={{ padding: "20px 0 16px", borderBottom: "1px solid #1e0e12", marginBottom: 24 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <p style={{ fontSize: 10, color: "#c8102e", fontFamily: "Georgia,serif", letterSpacing: 4 }}>{chapter.label}</p>
          <p style={{ fontSize: 11, color: "#3a2a2e", fontFamily: "Georgia,serif" }}>残り {chapter.daysLeft} 日</p>
        </div>
        <p style={{ fontSize: 17, color: "#ede8ea", fontFamily: "Georgia,serif", marginTop: 4 }}>{chapter.title}</p>
      </div>

      <p style={{ fontSize: 15, color: "#c8bfc2", fontFamily: "Georgia,serif", lineHeight: 2.1, whiteSpace: "pre-line", marginBottom: 28, minHeight: 80 }}>
        {sitText}{!sitDone && <Cursor color="#3a2a2e"/>}
      </p>

      {(phase !== "situation") && (
        <div style={{ padding: "12px 16px", borderLeft: "2px solid #5a0612", marginBottom: 28, background: "rgba(200,16,46,0.04)", animation: "fadeIn 0.5s ease" }}>
          <p style={{ fontSize: 13, color: "#8a7a7e", fontFamily: "Georgia,serif", lineHeight: 1.9, whiteSpace: "pre-line" }}>
            {chapter.event}
          </p>
        </div>
      )}

      {phase === "choices" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, animation: "fadeIn 0.4s ease" }}>
          <p style={{ fontSize: 10, color: "#3a2a2e", fontFamily: "Georgia,serif", letterSpacing: 3, marginBottom: 8 }}>
            — どうしますか —
          </p>
          {chapter.choices.map(ch => (
            <Btn key={ch.id} onClick={() => handleChoice(ch)} full>
              {ch.id}　　{ch.text}
            </Btn>
          ))}
        </div>
      )}

      {(phase === "result" || phase === "reflection" || phase === "done") && choiceResult && (
        <div style={{ animation: "fadeIn 0.5s ease", marginBottom: 24 }}>
          <p style={{ fontSize: 14, color: "#ede8ea", fontFamily: "Georgia,serif", lineHeight: 2.2, whiteSpace: "pre-line" }}>
            {resultText}{!resultDone && <Cursor/>}
          </p>
        </div>
      )}

      {phase === "reflection" && !reflectSaved && (
        <div style={{ animation: "fadeIn 0.6s ease" }}>
          <div style={{ padding: 20, border: "1px solid #1e0e12", background: "#0e0a0c", marginBottom: 14 }}>
            <p style={{ fontSize: 10, color: "#c8102e", fontFamily: "Georgia,serif", letterSpacing: 3, marginBottom: 12 }}>
              — 語り手より —
            </p>
            <p style={{ fontSize: 14, color: "#c8bfc2", fontFamily: "Georgia,serif", lineHeight: 2, marginBottom: 16 }}>
              {chapter.reflection}
            </p>
            <textarea value={reflectText} onChange={e => setReflectText(e.target.value)}
              placeholder="あなたの言葉（スキップも可）"
              style={{ width: "100%", background: "#080608", border: "1px solid #1e0e12", color: "#ede8ea",
                padding: "10px 12px", fontFamily: "Georgia,serif", fontSize: 13, outline: "none",
                resize: "none", lineHeight: 1.8 }} rows={2} />
          </div>
          <Btn onClick={() => { onReflect(reflectText); setReflectSaved(true); setPhase("done"); }} full>
            {reflectText ? "記録して次へ" : "スキップして次へ"}
          </Btn>
        </div>
      )}

      {phase === "done" && (
        <div style={{ animation: "fadeIn 0.5s ease" }}>
          {reflectText && (
            <p style={{ fontSize: 13, color: "#5a4a4e", fontFamily: "Georgia,serif", fontStyle: "italic",
              borderLeft: "1px solid #1e0e12", paddingLeft: 14, marginBottom: 16, lineHeight: 1.9 }}>
              「{reflectText}」
            </p>
          )}
          <Btn onClick={onNext} full>
            {chapter.id === 6 ? "エピローグへ" : "次の章へ"}
          </Btn>
        </div>
      )}
    </div>
  );
}

function FuneralScreen({ pov, onContinue }) {
  const text = pov === "self"
    ? "葬儀の準備をしているのは、\nあなたが一番愛した人たちだった。\n\n花を選ぶ手が震えている。\n写真を一枚選ぶのに、一時間かかった。\n\n部屋の隅に、誰かが置いたコーヒーが冷めていた。\n\n「あの時もっと、一緒にいればよかった」\n\nその言葉が、部屋の中に静かに漂っていた。"
    : "葬儀の準備をしながら、\nあなたはあの人の声を思い出していた。\n\n最後に交わした言葉が、\n何だったか思い出せない。\n昨日のことなのに、もう遠い。\n\n「あの時もっと、ちゃんと話しておけばよかった」\n\nその後悔だけが、鮮明に残っていた。";

  const {displayed, done} = useTypewriter(text, 22);
  return (
    <div style={{ width: "100%", maxWidth: 500, margin: "0 auto", padding: "40px 0 60px" }}>
      <p style={{ fontSize: 10, color: "#5a0612", fontFamily: "Georgia,serif", letterSpacing: 5, marginBottom: 32, textAlign: "center" }}>
        EPILOGUE
      </p>
      <p style={{ fontSize: 15, color: "#5a4a4e", fontFamily: "Georgia,serif", lineHeight: 2.4, whiteSpace: "pre-line", minHeight: 200 }}>
        {displayed}{!done && <Cursor color="#3a2a2e"/>}
      </p>
      {done && (
        <div style={{ marginTop: 40, animation: "fadeIn 0.8s ease" }}>
          <Btn onClick={onContinue} full>— 今の自分に戻る —</Btn>
        </div>
      )}
    </div>
  );
}

function EndingScreen({ impacts, reflections, onRestart }) {
  const ending = getEnding(impacts);
  const {displayed, done} = useTypewriter(ending.text, 22);
  const [showActions, setShowActions] = useState(false);
  const [checked, setChecked] = useState({});
  useEffect(() => { if (done) setTimeout(() => setShowActions(true), 1000); }, [done]);

  const actions = [
    {t: "今夜、家族と一緒に食事をする", d: "「また今度」は来ないかもしれない。今夜、同じテーブルを囲む。"},
    {t: "ありがとうを、直接言葉で伝える", d: "LINEではなく、電話か対面で。「いつもありがとう」の一言から。"},
    {t: "大切な人に電話をかける", d: "元気かどうか、今どんな毎日か。今日、聞く。"},
    {t: "一緒に写真を撮る", d: "最後に家族と写真を撮ったのはいつ？今週末、集まって撮る。"},
    {t: "JANEに「言葉」を残す", d: "もしもの時のために、大切な人へのメッセージを今日書いておく。"},
  ];

  return (
    <div style={{ width: "100%", maxWidth: 500, margin: "0 auto", padding: "40px 0 80px" }}>
      <p style={{ fontSize: 10, color: "#5a0612", fontFamily: "Georgia,serif", letterSpacing: 5, marginBottom: 28, textAlign: "center" }}>
        ENDING
      </p>
      <p style={{ fontSize: 13, color: "#c8102e", fontFamily: "Georgia,serif", letterSpacing: 2, marginBottom: 20 }}>
        {ending.title}
      </p>
      <p style={{ fontSize: 15, color: "#c8bfc2", fontFamily: "Georgia,serif", lineHeight: 2.3, whiteSpace: "pre-line", marginBottom: 32 }}>
        {displayed}{!done && <Cursor/>}
      </p>

      {done && reflections.filter(r => r.text).length > 0 && (
        <div style={{ borderTop: "1px solid #1e0e12", paddingTop: 24, marginBottom: 32, animation: "fadeIn 0.8s ease" }}>
          <p style={{ fontSize: 10, color: "#3a2a2e", fontFamily: "Georgia,serif", letterSpacing: 3, marginBottom: 18 }}>
            — あなたが残した言葉 —
          </p>
          {reflections.filter(r => r.text).map((r, i) => (
            <div key={i} style={{ marginBottom: 16, paddingBottom: 16, borderBottom: "1px solid #0e0a0c" }}>
              <p style={{ fontSize: 10, color: "#5a0612", fontFamily: "Georgia,serif", marginBottom: 4 }}>{r.chapter}</p>
              <p style={{ fontSize: 13, color: "#ede8ea", fontFamily: "Georgia,serif", fontStyle: "italic", lineHeight: 1.9 }}>「{r.text}」</p>
            </div>
          ))}
        </div>
      )}

      {showActions && (
        <div style={{ animation: "fadeIn 0.8s ease" }}>
          <p style={{ fontSize: 10, color: "#3a2a2e", fontFamily: "Georgia,serif", letterSpacing: 3, marginBottom: 16 }}>
            — 今日から、始められること —
          </p>
          <div style={{ marginBottom: 32, display: "flex", flexDirection: "column", gap: 0 }}>
            {actions.map((a, i) => (
              <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start",
                padding: "14px 0", borderBottom: "1px solid #0e0a0c" }}>
                <button onClick={() => setChecked(c => ({...c, [i]: !c[i]}))} style={{
                  width: 16, height: 16, border: `1px solid ${checked[i] ? "#c8102e" : "#2a1a1e"}`,
                  background: checked[i] ? "#c8102e" : "transparent", cursor: "pointer",
                  flexShrink: 0, marginTop: 3, color: "#ede8ea", fontSize: 10, fontFamily: "Georgia,serif" }}>
                  {checked[i] ? "✓" : ""}
                </button>
                <div>
                  <p style={{ fontSize: 13, color: checked[i] ? "#3a2a2e" : "#ede8ea", fontFamily: "Georgia,serif",
                    marginBottom: 3, textDecoration: checked[i] ? "line-through" : "none" }}>{a.t}</p>
                  <p style={{ fontSize: 11, color: "#5a4a4e", fontFamily: "Georgia,serif", lineHeight: 1.8 }}>{a.d}</p>
                </div>
              </div>
            ))}
          </div>

          <div style={{ padding: "28px 24px", border: "1px solid #5a0612", background: "#0e0a0c",
            textAlign: "center", marginBottom: 24,
            boxShadow: "0 0 24px rgba(200,16,46,0.1)" }}>
            <p style={{ fontSize: 10, color: "#c8102e", fontFamily: "Georgia,serif", letterSpacing: 4, marginBottom: 12 }}>
              NEXT STEP
            </p>
            <p style={{ fontSize: 16, color: "#ede8ea", fontFamily: "Georgia,serif", marginBottom: 10, lineHeight: 1.7 }}>
              大切な人に、言葉を残そう。
            </p>
            <p style={{ fontSize: 12, color: "#5a4a4e", fontFamily: "Georgia,serif", lineHeight: 2, marginBottom: 22 }}>
              JANEは「言えなかった」をなくすための<br/>生き活支援アプリです。
            </p>
            <a href="https://jaane.net?ref=yomei" target="_blank" rel="noopener"
              style={{ display: "inline-block", background: "#c8102e", color: "#ede8ea",
                padding: "14px 36px", fontFamily: "Georgia,serif", fontSize: 13,
                letterSpacing: 2, textDecoration: "none",
                boxShadow: "0 0 20px rgba(200,16,46,0.3)" }}>
              JANEをはじめる（無料）
            </a>
          </div>

          <Btn onClick={onRestart} full dim>↩ もう一度プレイする</Btn>
        </div>
      )}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("opening");
  const [pov, setPov] = useState("self");
  const [chapterIdx, setChapterIdx] = useState(0);
  const [choiceResult, setChoiceResult] = useState(null);
  const [impacts, setImpacts] = useState([]);
  const [reflections, setReflections] = useState([]);

  const chapter = CHAPTERS[chapterIdx];

  const handleOpeningComplete = (p) => {
    setPov(p);
    setChapterIdx(0);
    setChoiceResult(null);
    setImpacts([]);
    setReflections([]);
    setScreen(p === "self" ? "selfIntro" : "chapter");
  };

  const handleChoice = (ch) => {
    setChoiceResult(ch.result);
    setImpacts(imp => [...imp, ch.impact]);
  };

  const handleReflect = (text) => {
    setReflections(r => [...r, {chapter: chapter.label, text}]);
  };

  const handleNext = () => {
    setChoiceResult(null);
    if (chapterIdx < CHAPTERS.length - 1) setChapterIdx(i => i + 1);
    else setScreen("funeral");
  };

  const restart = () => {
    setChapterIdx(0); setChoiceResult(null);
    setImpacts([]); setReflections([]);
    setScreen("opening");
  };

  return (
    <div style={{ background: "#080608", minHeight: "100vh", color: "#ede8ea", padding: "0 20px" }}>
      {screen === "opening" && <Opening onComplete={handleOpeningComplete} />}
      {screen === "selfIntro" && <SelfIntro onStart={() => setScreen("chapter")} />}
      {screen === "chapter" && (
        <div style={{maxWidth: 520, margin: "0 auto", paddingTop: 32}}>
          <ChapterScreen
            key={chapterIdx}
            chapter={chapter}
            pov={pov}
            onChoice={handleChoice}
            choiceResult={choiceResult}
            onNext={handleNext}
            onReflect={handleReflect}
          />
        </div>
      )}
      {screen === "funeral" && <div style={{maxWidth: 500, margin: "0 auto", paddingTop: 32}}><FuneralScreen pov={pov} onContinue={() => setScreen("ending")} /></div>}
      {screen === "ending" && <div style={{maxWidth: 500, margin: "0 auto", paddingTop: 32}}><EndingScreen impacts={impacts} reflections={reflections} onRestart={restart} /></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
