<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>最後の既読 | 残された通知</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { min-height: 100%; }
  body {
    background:
      radial-gradient(circle at 50% 0%, rgba(255, 239, 229, 0.92), transparent 34%),
      linear-gradient(145deg, #f7eee9 0%, #e7d9d4 45%, #d6c2bd 100%);
    color: #fff8f4;
    font-family: Georgia, "Hiragino Mincho ProN", "Yu Mincho", serif;
  }
  button, input, textarea { font: inherit; }
  button { -webkit-tap-highlight-color: transparent; }
  textarea { resize: none; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #3b3032; border-radius: 999px; }

  .stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
  }
  .phone {
    width: min(100%, 430px);
    height: min(860px, calc(100vh - 56px));
    min-height: 640px;
    padding: 14px;
    border-radius: 42px;
    background: linear-gradient(145deg, #21191b, #0f0c0d);
    box-shadow: 0 28px 80px rgba(61, 38, 41, 0.28), inset 0 0 0 1px rgba(255, 248, 244, 0.08);
  }
  .screen {
    position: relative;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    border-radius: 30px;
    background:
      radial-gradient(circle at 50% 0%, rgba(151, 105, 109, 0.22), transparent 34%),
      linear-gradient(180deg, #201719 0%, #171214 68%, #141011 100%);
    box-shadow: inset 0 0 0 1px rgba(255, 248, 244, 0.06);
  }
  .notch {
    position: sticky;
    top: 8px;
    z-index: 20;
    width: 96px;
    height: 20px;
    margin: 8px auto 0;
    border-radius: 999px;
    background: #100d0e;
    opacity: 0.9;
  }
  .page { min-height: calc(100% - 28px); padding: 38px 26px 34px; }
  .center { display: flex; min-height: calc(100% - 28px); flex-direction: column; justify-content: center; }
  .eyebrow { color: #d99aa3; font-size: 10px; letter-spacing: 3px; margin-bottom: 14px; }
  .muted { color: #a9979a; }
  .soft { color: #d9c9c7; }
  .title {
    color: #ffd0d6;
    font-size: 30px;
    line-height: 1.25;
    letter-spacing: 3px;
    text-shadow: 0 14px 38px rgba(217, 154, 163, 0.28);
  }
  .body {
    color: #d9c9c7;
    font-size: 14px;
    line-height: 2.1;
    white-space: pre-line;
  }
  .timebar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    color: #b7a4a6;
    font-size: 11px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid rgba(255,248,244,0.1);
    border-radius: 999px;
    padding: 7px 11px;
    color: #e8c2c7;
    background: rgba(255,248,244,0.04);
    font-size: 11px;
  }
  .btn {
    width: 100%;
    border: 1px solid #94646b;
    border-radius: 16px;
    padding: 14px 16px;
    background: rgba(255,248,244,0.04);
    color: #ffd8dd;
    text-align: left;
    cursor: pointer;
    transition: 0.15s ease;
  }
  .btn:hover { background: #d99aa3; color: #171214; box-shadow: 0 12px 26px rgba(217,154,163,0.18); }
  .btn.primary { background: #d99aa3; color: #171214; border-color: #d99aa3; text-align: center; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .card {
    border: 1px solid rgba(255,248,244,0.08);
    border-radius: 18px;
    background: rgba(255,248,244,0.035);
    padding: 16px;
  }
  .notification {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    border: 1px solid rgba(255,248,244,0.08);
    border-radius: 18px;
    background: rgba(255,248,244,0.045);
    padding: 13px 14px;
    animation: rise 0.35s ease both;
  }
  .icon {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    flex: 0 0 auto;
    border-radius: 11px;
    background: rgba(255,248,244,0.08);
    font-size: 17px;
  }
  .message-name { color: #fff8f4; font-size: 13px; margin-bottom: 4px; }
  .message-text { color: #a9979a; font-size: 12px; line-height: 1.7; }
  .countdown {
    color: #ffd0d6;
    font-size: 72px;
    line-height: 1;
    letter-spacing: 2px;
    text-align: center;
    text-shadow: 0 18px 48px rgba(217,154,163,0.26);
  }
  .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 24px 0; }
  .app-icon {
    border: 0;
    background: transparent;
    color: #d9c9c7;
    text-align: center;
    cursor: pointer;
  }
  .app-icon span {
    display: grid;
    place-items: center;
    width: 56px;
    height: 56px;
    margin: 0 auto 8px;
    border-radius: 17px;
    background: rgba(255,248,244,0.075);
    font-size: 24px;
  }
  .app-icon small { display: block; color: #a9979a; font-size: 11px; }
  .memory {
    min-height: 112px;
    border-radius: 18px;
    padding: 16px;
    background: linear-gradient(145deg, rgba(255,248,244,0.10), rgba(217,154,163,0.08));
    border: 1px solid rgba(255,248,244,0.1);
  }
  .draft {
    width: 100%;
    min-height: 132px;
    border: 1px solid rgba(255,248,244,0.1);
    border-radius: 16px;
    background: rgba(12,10,10,0.38);
    color: #fff8f4;
    padding: 14px;
    outline: none;
    line-height: 1.8;
  }
  .question { margin-bottom: 18px; }
  .question label { display: block; color: #d9c9c7; font-size: 13px; line-height: 1.8; margin-bottom: 8px; }
  .question input {
    width: 100%;
    border: 1px solid rgba(255,248,244,0.1);
    border-radius: 14px;
    background: rgba(12,10,10,0.35);
    color: #fff8f4;
    padding: 12px 13px;
    outline: none;
  }
  .testament {
    border-left: 2px solid #d99aa3;
    padding-left: 16px;
    color: #fff8f4;
    font-size: 15px;
    line-height: 2.25;
    white-space: pre-line;
  }
  .blink { animation: blink 1.2s ease infinite; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes blink { 50% { opacity: 0.25; } }

  @media (max-width: 560px) {
    .stage { padding: 0; }
    .phone { width: 100%; height: 100vh; min-height: 100vh; padding: 0; border-radius: 0; box-shadow: none; }
    .screen { border-radius: 0; }
    .notch { display: none; }
    .page { padding-top: 44px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useEffect, useMemo, useState } = React;

const notifications = [
  { app: "仕事", icon: "💼", text: "山田部長：例の資料、今日中に確認できますか？" },
  { app: "母", icon: "📞", text: "不在着信 2件" },
  { app: "LINE", icon: "💬", text: "健太：どうでもいい話なんだけどさ" },
  { app: "SNS", icon: "♡", text: "あなたの投稿に38件のいいね" },
];

const denialApps = [
  { name: "SNS", icon: "♡", text: "誰かの昼ごはん。誰かの旅行。世界はいつも通り流れている。" },
  { name: "仕事", icon: "💼", text: "返信を書こうとして、敬語だけが妙に遠く感じた。" },
  { name: "カレンダー", icon: "📅", text: "来月の予定が並んでいる。そこに自分がいる確信だけがない。" },
  { name: "写真", icon: "🖼️", text: "最後に家族と撮った写真が、思い出せない。" },
  { name: "メモ", icon: "📝", text: "やることリストには、まだ生活が残っている。" },
  { name: "電話", icon: "📞", text: "母の名前がある。押せばつながる。ただ、それだけが重い。" },
];

const memories = [
  { title: "夏の帰り道", text: "ぬるい風。遠くの踏切。溶けかけたアイス。あの日は、ただ帰るだけでよかった。" },
  { title: "家族との食卓", text: "味噌汁の湯気。テレビの音。誰も大切だなんて言わなかった。でも、全部そこにあった。" },
  { title: "夜のコンビニ", text: "元恋人と買った安いコーヒー。くだらない話。もう戻れないのに、光だけは覚えている。" },
  { title: "子ども時代の公園", text: "夕方の匂い。砂のついた手。呼ばれた自分の名前。あの頃は、明日が無限だった。" },
];

const questions = [
  "本当は誰に会いたいですか？",
  "誰に謝りたいですか？",
  "誰に感謝していますか？",
  "人生で一番幸せだった瞬間は？",
  "もし明日終わるなら何をしますか？",
];

function nowText() {
  return new Intl.DateTimeFormat("ja-JP", {
    hour: "2-digit",
    minute: "2-digit",
    weekday: "short",
    month: "long",
    day: "numeric",
  }).format(new Date());
}

function Button({ children, onClick, primary=false }) {
  return <button className={`btn ${primary ? "primary" : ""}`} onClick={onClick}>{children}</button>;
}

function TimeBar({ days }) {
  return (
    <div className="timebar">
      <span>{nowText()}</span>
      <span className="pill">残り {days} 日</span>
    </div>
  );
}

function Intro({ onNext }) {
  return (
    <div className="page center">
      <p className="eyebrow">CONCEPT</p>
      <h1 className="title">最後の既読</h1>
      <p className="body" style={{ marginTop: 18 }}>
        この物語は、死を体験させるアプリではない。{"\n\n"}
        失ってから気づくはずだった感情を、まだ間に合う今、先に体験するためのアプリである。
      </p>
      <div style={{ marginTop: 34 }}>
        <Button primary onClick={onNext}>はじめる</Button>
      </div>
    </div>
  );
}

function Hospital({ onNext }) {
  const [visible, setVisible] = useState(0);
  useEffect(() => {
    const timers = notifications.map((_, i) => setTimeout(() => setVisible(i + 1), 900 + i * 750));
    const next = setTimeout(onNext, 5700);
    return () => { timers.forEach(clearTimeout); clearTimeout(next); };
  }, []);

  return (
    <div className="page center">
      <p className="eyebrow">HOSPITAL</p>
      <p className="body">
        白い天井。{"\n"}
        消毒液の匂い。{"\n"}
        遠くで鳴る心電図。
      </p>
      <div className="stack" style={{ marginTop: 28 }}>
        {notifications.slice(0, visible).map((n, i) => (
          <div className="notification" key={i}>
            <div className="icon">{n.icon}</div>
            <div>
              <p className="message-name">{n.app}</p>
              <p className="message-text">{n.text}</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Diagnosis({ onNext }) {
  return (
    <div className="page center">
      <p className="eyebrow">DOCTOR</p>
      <p className="body">
        検査結果ですが……{"\n\n"}
        残された時間は、長くありません。{"\n\n"}
        おそらく、3ヶ月です。
      </p>
      <div style={{ marginTop: 34 }}>
        <Button onClick={onNext}>通知を見る</Button>
      </div>
    </div>
  );
}

function Denial({ onNext, onOpenApp }) {
  return (
    <div className="page">
      <TimeBar days={89} />
      <p className="eyebrow">PHASE 1 / 否認</p>
      <h2 className="title" style={{ fontSize: 22 }}>いや、まだ大丈夫</h2>
      <p className="body" style={{ marginTop: 14 }}>
        誤診かもしれない。{"\n"}
        明日になれば、いつもの生活に戻れるかもしれない。{"\n\n"}
        だからあなたは、いつも通りスマホを触る。
      </p>
      <div className="app-grid">
        {denialApps.map((app) => (
          <button className="app-icon" key={app.name} onClick={() => onOpenApp(app)}>
            <span>{app.icon}</span>
            <small>{app.name}</small>
          </button>
        ))}
      </div>
      <Button primary onClick={onNext}>夜になる</Button>
    </div>
  );
}

function AppModal({ app, onClose }) {
  if (!app) return null;
  return (
    <div className="page center" style={{ position: "absolute", inset: 0, zIndex: 30, background: "rgba(20,16,17,0.96)" }}>
      <div className="card">
        <p className="eyebrow">{app.name}</p>
        <p className="body">{app.text}</p>
      </div>
      <div style={{ marginTop: 18 }}>
        <Button onClick={onClose}>閉じる</Button>
      </div>
    </div>
  );
}

function Loneliness({ onNext }) {
  return (
    <div className="page center">
      <TimeBar days={72} />
      <p className="eyebrow">PHASE 2 / 孤独</p>
      <p className="body">
        病室。夜。{"\n"}
        通知が減る。{"\n\n"}
        最初はみんな心配する。{"\n"}
        でも徐々に、世界は普通に進み始める。{"\n\n"}
        自分だけが止まっている。
      </p>
      <div className="card" style={{ marginTop: 28 }}>
        <p className="message-name">母</p>
        <p className="message-text">不在着信。再生されませんでした。</p>
      </div>
      <div style={{ marginTop: 20 }}>
        <Button primary onClick={onNext}>記憶が戻る</Button>
      </div>
    </div>
  );
}

function Memories({ onNext }) {
  return (
    <div className="page">
      <TimeBar days={45} />
      <p className="eyebrow">PHASE 3 / 記憶回帰</p>
      <p className="body">
        成果ではなく、情景ばかりを思い出す。{"\n"}
        胸が苦しくなるほど、どうでもよかった日常。
      </p>
      <div className="stack" style={{ marginTop: 20 }}>
        {memories.map((m) => (
          <div className="memory" key={m.title}>
            <p className="message-name">{m.title}</p>
            <p className="message-text">{m.text}</p>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 20 }}>
        <Button primary onClick={onNext}>未送信の下書きを開く</Button>
      </div>
    </div>
  );
}

function Unsent({ draft, setDraft, onNext }) {
  return (
    <div className="page">
      <TimeBar days={28} />
      <p className="eyebrow">最も重要な章 / 未送信</p>
      <h2 className="title" style={{ fontSize: 22 }}>言えなかった言葉</h2>
      <p className="body" style={{ marginTop: 14 }}>
        ごめん。ありがとう。本当は嫌だった。愛してる。会いたい。{"\n\n"}
        ここに書くことはできる。{"\n"}
        でも、この画面から送信することはできない。
      </p>
      <textarea
        className="draft"
        value={draft}
        onChange={e => setDraft(e.target.value)}
        placeholder="言えなかった言葉を書く"
        style={{ marginTop: 20 }}
      />
      <p className="message-text" style={{ margin: "10px 0 18px" }}>未送信として保存されます。</p>
      <Button primary onClick={onNext}>保存せずに閉じる</Button>
    </div>
  );
}

function Quiet({ onNext }) {
  return (
    <div className="page center">
      <TimeBar days={7} />
      <p className="eyebrow">残り7日</p>
      <p className="body">
        世界が異常に静かになる。{"\n\n"}
        BGMも減る。{"\n"}
        通知も来ない。{"\n"}
        空気音だけ。{"\n\n"}
        人生って、{"\n"}
        誰かとのノイズだったんだ。
      </p>
      <div style={{ marginTop: 34 }}>
        <Button onClick={onNext}>目を閉じる</Button>
      </div>
    </div>
  );
}

function ReturnToNow({ onNext }) {
  return (
    <div className="page center" style={{ background: "#080607" }}>
      <p className="body blink" style={{ textAlign: "center", color: "#5f5557", marginBottom: 34 }}>無音</p>
      <p className="eyebrow" style={{ textAlign: "center" }}>{nowText()}</p>
      <h2 className="title" style={{ textAlign: "center", fontSize: 24 }}>あなたは、まだ間に合います</h2>
      <div style={{ marginTop: 34 }}>
        <Button primary onClick={onNext}>今の自分に戻る</Button>
      </div>
    </div>
  );
}

function Questions({ answers, setAnswers, onNext }) {
  const update = (i, value) => {
    setAnswers(current => current.map((a, idx) => idx === i ? value : a));
  };
  return (
    <div className="page">
      <p className="eyebrow">最後の体験</p>
      <h2 className="title" style={{ fontSize: 22 }}>まだ間に合うこと</h2>
      <p className="body" style={{ marginTop: 14, marginBottom: 22 }}>
        最後に、今のあなたの言葉を残してください。
      </p>
      {questions.map((q, i) => (
        <div className="question" key={q}>
          <label>{q}</label>
          <input value={answers[i]} onChange={e => update(i, e.target.value)} placeholder="短い言葉で大丈夫です" />
        </div>
      ))}
      <Button primary onClick={onNext}>言葉をまとめる</Button>
    </div>
  );
}

function Testament({ answers, draft, onRestart }) {
  const text = useMemo(() => {
    const [meet, sorry, thanks, happy, tomorrow] = answers.map(a => a.trim()).map(a => a || "まだ言葉にならない誰か");
    const draftLine = draft.trim() ? `\n\n未送信のまま残っていた言葉。\n「${draft.trim()}」` : "";
    return `自分は、成功したかったんじゃない。\n\nただ、ちゃんと誰かと生きたかった。\n\n本当は、${meet}に会いたかった。\n${sorry}に謝りたかった。\n${thanks}にありがとうを伝えたかった。\n\n一番幸せだったのは、${happy}。\n\nもし明日終わるなら、${tomorrow}。\n\nだから今日、後回しにしない。${draftLine}`;
  }, [answers, draft]);

  return (
    <div className="page">
      <p className="eyebrow">あなたの言葉</p>
      <div className="testament">{text}</div>
      <div className="card" style={{ marginTop: 28 }}>
        <p className="message-name">最終メッセージ</p>
        <p className="message-text">
          この物語は、死についての作品ではない。今日を後回しにしないための作品である。
        </p>
      </div>
      <div className="stack" style={{ marginTop: 22 }}>
        <a className="btn primary" href="https://jaane.net?ref=last-read" target="_blank" rel="noopener" style={{ textDecoration: "none" }}>
          大切な人に言葉を残す
        </a>
        <Button onClick={onRestart}>もう一度体験する</Button>
      </div>
    </div>
  );
}

function App() {
  const [step, setStep] = useState(0);
  const [openedApp, setOpenedApp] = useState(null);
  const [draft, setDraft] = useState("");
  const [answers, setAnswers] = useState(Array(questions.length).fill(""));

  const next = () => setStep(s => s + 1);
  const restart = () => {
    setStep(0);
    setOpenedApp(null);
    setDraft("");
    setAnswers(Array(questions.length).fill(""));
  };

  return (
    <div className="stage">
      <div className="phone">
        <div className="screen">
          <div className="notch" />
          {step === 0 && <Intro onNext={next} />}
          {step === 1 && <Hospital onNext={next} />}
          {step === 2 && <Diagnosis onNext={next} />}
          {step === 3 && <Denial onNext={next} onOpenApp={setOpenedApp} />}
          {step === 4 && <Loneliness onNext={next} />}
          {step === 5 && <Memories onNext={next} />}
          {step === 6 && <Unsent draft={draft} setDraft={setDraft} onNext={next} />}
          {step === 7 && <Quiet onNext={next} />}
          {step === 8 && <ReturnToNow onNext={next} />}
          {step === 9 && <Questions answers={answers} setAnswers={setAnswers} onNext={next} />}
          {step >= 10 && <Testament answers={answers} draft={draft} onRestart={restart} />}
          <AppModal app={openedApp} onClose={() => setOpenedApp(null)} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
