<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>最後の既読</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { min-height: 100%; }
  body {
    background:
      #080608;
    color: #ede8ea;
    font-family: Georgia, "Hiragino Mincho ProN", "Yu Mincho", serif;
  }
  button, input, textarea { font: inherit; }
  button { -webkit-tap-highlight-color: transparent; }
  textarea { resize: none; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #1e0e12; border-radius: 999px; }

  .stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
  }
  .phone {
    width: min(100%, 430px);
    height: min(860px, calc(100vh - 56px));
    min-height: 640px;
    padding: 14px;
    border-radius: 42px;
    background: #0e0a0c;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.48), inset 0 0 0 2px #1e0e12;
  }
  .screen {
    position: relative;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    border-radius: 30px;
    background:
      radial-gradient(circle at 50% 18%, rgba(200,16,46,0.12) 0%, rgba(14,10,12,0.96) 45%, #080608 100%);
    box-shadow: inset 0 0 0 1px #1e0e12;
  }
  .notch {
    position: sticky;
    top: 8px;
    z-index: 40;
    width: 96px;
    height: 20px;
    margin: 8px auto 0;
    border-radius: 999px;
    background: #07080c;
    opacity: 0.92;
  }
  .page { min-height: calc(100% - 28px); padding: 38px 26px 34px; }
  .center { display: flex; min-height: calc(100% - 28px); flex-direction: column; justify-content: center; }
  .tap-page { cursor: pointer; user-select: none; }
  .eyebrow { color: #5a4a4e; font-size: 10px; letter-spacing: 3px; margin-bottom: 14px; text-transform: uppercase; }
  .title {
    color: #ede8ea;
    font-size: 28px;
    line-height: 1.25;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 #050305;
  }
  .story-line {
    color: #ede8ea;
    font-size: 17px;
    line-height: 1.9;
    letter-spacing: 0;
    text-align: center;
    white-space: pre-line;
    overflow-wrap: anywhere;
    text-shadow: 0 0 18px rgba(200,16,46,0.16);
    animation: fadeWord 0.42s ease both;
  }
  .story-sub {
    color: #5a4a4e;
    font-size: 12px;
    line-height: 1.8;
    margin-top: 18px;
  }
  .hint {
    position: absolute;
    left: 26px;
    right: 26px;
    bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #5a4a4e;
    font-size: 11px;
  }
  .progress {
    height: 3px;
    width: 88px;
    border-radius: 999px;
    background: #1e0e12;
    overflow: hidden;
  }
  .progress span {
    display: block;
    height: 100%;
    border-radius: inherit;
    background: #ede8ea;
    transition: width 0.22s ease;
  }
  .timebar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    color: #8a7a7e;
    font-size: 11px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 2px solid #ede8ea;
    border-radius: 0;
    padding: 7px 11px;
    color: #ede8ea;
    background: #0e0a0c;
    font-size: 11px;
  }
  .btn {
    width: 100%;
    border: 3px solid #ede8ea;
    border-radius: 0;
    padding: 14px 16px;
    background: #0e0a0c;
    color: #ede8ea;
    text-align: left;
    cursor: pointer;
    transition: 0.15s ease;
  }
  .btn:hover { background: #ede8ea; color: #0e0a0c; box-shadow: 4px 4px 0 #050305; }
  .btn.primary { background: #5a0612; color: #ede8ea; border-color: #ede8ea; text-align: center; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .card {
    border: 3px solid #ede8ea;
    border-radius: 0;
    background: #0e0a0c;
    padding: 16px;
    box-shadow: 4px 4px 0 #050305;
  }
  .notification {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    border: 3px solid #ede8ea;
    border-radius: 0;
    background: #0e0a0c;
    padding: 13px 14px;
    animation: rise 0.32s ease both;
  }
  .icon {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    flex: 0 0 auto;
    border-radius: 0;
    background: #5a0612;
    font-size: 17px;
  }
  .message-name { color: #ede8ea; font-size: 13px; margin-bottom: 4px; }
  .message-text { color: #8a7a7e; font-size: 12px; line-height: 1.7; }
  .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 24px 0; }
  .app-icon {
    border: 0;
    background: transparent;
    color: #ede8ea;
    text-align: center;
    cursor: pointer;
  }
  .app-icon span {
    display: grid;
    place-items: center;
    width: 56px;
    height: 56px;
    margin: 0 auto 8px;
    border: 3px solid #ede8ea;
    border-radius: 0;
    background: #0e0a0c;
    box-shadow: 4px 4px 0 #050305;
    font-size: 24px;
  }
  .app-icon small { display: block; color: #8a7a7e; font-size: 11px; }
  .memory {
    min-height: 112px;
    border-radius: 0;
    padding: 16px;
    background: #0e0a0c;
    border: 3px solid #ede8ea;
    box-shadow: 4px 4px 0 #050305;
  }
  .draft {
    width: 100%;
    min-height: 132px;
    border: 3px solid #ede8ea;
    border-radius: 0;
    background: #080608;
    color: #ede8ea;
    padding: 14px;
    outline: none;
    line-height: 1.8;
  }
  .question { margin-bottom: 18px; }
  .question label { display: block; color: #ede8ea; font-size: 13px; line-height: 1.8; margin-bottom: 8px; }
  .question input {
    width: 100%;
    border: 3px solid #ede8ea;
    border-radius: 0;
    background: #080608;
    color: #ede8ea;
    padding: 12px 13px;
    outline: none;
  }
  .testament {
    border-left: 4px solid #ede8ea;
    padding-left: 16px;
    color: #ede8ea;
    font-size: 15px;
    line-height: 2.25;
    white-space: pre-line;
  }
  .dark-scene {
    background:
      linear-gradient(rgba(255,255,255,0.025) 50%, transparent 50%),
      radial-gradient(circle at 50% 18%, rgba(89, 119, 64, 0.24) 0%, rgba(10, 18, 12, 0.99) 56%, #080608 100%);
    color: #ede8ea;
  }
  .dark-scene .story-line, .dark-scene .title { color: #ede8ea; }
  .dark-scene .story-sub, .dark-scene .hint { color: #8a7a7e; }
  .dark-scene .progress { background: #1e0e12; }
  .dark-scene .eyebrow { color: #5a4a4e; }
  .blackout {
    background:
      linear-gradient(rgba(255,255,255,0.025) 50%, transparent 50%),
      radial-gradient(circle at 50% 42%, rgba(89, 119, 64, 0.18), transparent 42%),
      #080608;
  }
  .blackout .timebar,
  .blackout .eyebrow { opacity: 0.48; }
  .line-stage {
    display: flex;
    flex: 1;
    align-items: center;
    justify-content: center;
    padding: 28px 4px 84px;
  }
  .line-stage .title {
    color: #ede8ea;
    font-size: 30px;
    text-align: center;
    text-shadow: 0 0 18px rgba(200,16,46,0.22);
  }
  .line-group {
    width: 100%;
    max-width: 100%;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    overflow: visible;
  }
  .blink { animation: blink 1.2s ease infinite; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeWord { from { opacity: 0; transform: translateY(6px); filter: blur(3px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
  @keyframes blink { 50% { opacity: 0.25; } }

  @media (max-width: 560px) {
    .stage { padding: 0; }
    .phone { width: 100%; height: 100vh; min-height: 100vh; padding: 0; border-radius: 0; box-shadow: none; }
    .screen { border-radius: 0; }
    .notch { display: none; }
    .page { padding-top: 44px; }
  }
</style>
</head>
<body>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

  { title: "夜のコンビニ", text: "元恋人と買った安いコーヒー。くだらない話。もう戻れないのに、光だけは覚えている。" },

const questions = [

const storyScenes = {

  denialStory: {

    days: 89,

  },
  loneliness: {

    days: 72,
    lines: [
      "病室。",

  },
  memoryIntro: {

  },
  unsentIntro: {

  },

    days: 7,
    lines: [

  },
  returnNow: {

function nowText() {
  return new Intl.DateTimeFormat("ja-JP", {
    hour: "2-digit",
    minute: "2-digit",
    weekday: "short",
    month: "long",
    day: "numeric",
  }).format(new Date());
}

function Button({ children, onClick, primary=false }) {
  return <button className={`btn ${primary ? "primary" : ""}`} onClick={onClick}>{children}</button>;
}

function TimeBar({ days }) {
  return (
    <div className="timebar">
      <span>{nowText()}</span>
      {days && <span className="pill">残り {days} 日</span>}
    </div>
  );
}

function wrapStoryLine(text, maxChars = 18) {
  const chars = Array.from(text);
  const lines = [];
  let current = "";
  let lastBreak = -1;

  chars.forEach((char) => {
    current += char;
    if ("、。…！？".includes(char)) lastBreak = current.length;

    if (current.length >= maxChars) {
      if (lastBreak > 0 && lastBreak < current.length) {
        lines.push(current.slice(0, lastBreak));
        current = current.slice(lastBreak);
      } else {
        lines.push(current);
        current = "";
      }
      lastBreak = -1;
    }
  });

  if (current) lines.push(current);
  return lines.join("\n");
}

function StoryScene({ scene, onDone }) {
  const [lineIndex, setLineIndex] = useState(0);
  const [charIndex, setCharIndex] = useState(0);
  const line = scene.lines[lineIndex];
  const displayLine = wrapStoryLine(line);
  const isLineDone = charIndex >= line.length;
  const isLast = lineIndex >= scene.lines.length - 1;
  const progress = ((lineIndex + 1) / scene.lines.length) * 100;

  useEffect(() => {
    setCharIndex(0);
  }, [lineIndex, scene.label]);

  useEffect(() => {
    if (isLineDone) return;
    const timer = setTimeout(() => setCharIndex(i => i + 1), 48);
    return () => clearTimeout(timer);
  }, [charIndex, isLineDone]);

  const advance = () => {
    if (!isLineDone) {
      setCharIndex(line.length);
      return;
    }
    if (isLast) onDone(scene.next);
    else setLineIndex(i => i + 1);
  };

  const visibleText = wrapStoryLine(line.slice(0, charIndex));
  const fontSize = displayLine.split("\n").some(part => part.length > 18) ? 14 : 17;

  return (
    <div className={`page center tap-page blackout ${scene.dark ? "dark-scene" : ""}`} onClick={advance}>
      <TimeBar days={scene.days} />
      <p className="eyebrow">{scene.label}</p>
      <div className="line-stage">
        <div key={`${scene.label}-${lineIndex}`} className="line-group">
          <p className="story-line" style={{ fontSize }}>
            {visibleText}
            {!isLineDone && <span className="blink">▌</span>}
          </p>
        </div>
      </div>
      <div className="hint">
        <span>{!isLineDone ? "タップで全文表示" : isLast ? "タップでつぎへ" : "タップで読む"}</span>
        <div className="progress"><span style={{ width: `${progress}%` }} /></div>
      </div>
    </div>
  );
}

function NotificationScene({ onDone }) {
  const [visible, setVisible] = useState(1);
  const isLast = visible >= notifications.length;
  const advance = () => {
    if (isLast) onDone("diagnosis");
    else setVisible(v => v + 1);
  };
  return (
    <div className="page center tap-page" onClick={advance}>
      <p className="eyebrow">LOCK SCREEN</p>
      <div className="stack">
        {notifications.slice(0, visible).map((n, i) => (
          <div className="notification" key={i}>
            <div className="icon">{n.icon}</div>
            <div>
              <p className="message-name">{n.app}</p>
              <p className="message-text">{n.text}</p>
            </div>
          </div>
        ))}
      </div>
      <div className="hint">
        <span>{isLast ? "タップで診察室へ" : "タップで通知を見る"}</span>
        <div className="progress"><span style={{ width: `${(visible / notifications.length) * 100}%` }} /></div>
      </div>
    </div>
  );
}

function Memories({ onNext }) {

}

function Questions({ answers, setAnswers, onNext }) {
  const update = (i, value) => {
    setAnswers(current => current.map((a, idx) => idx === i ? value : a));
  };
  return (
    <div className="page">
      <p className="eyebrow">LAST QUESTION</p>
      <h2 className="title" style={{ fontSize: 24 }}>まだ間に合うこと</h2>
      <p className="message-text" style={{ marginTop: 10, marginBottom: 22 }}>今のあなたの言葉を残してください。</p>
      {questions.map((q, i) => (
        <div className="question" key={q}>
          <label>{q}</label>
          <input value={answers[i]} onChange={e => update(i, e.target.value)} placeholder="短い言葉で大丈夫です" />
        </div>
      ))}
      <Button primary onClick={() => onNext("testament")}>言葉をまとめる</Button>
    </div>
  );
}

function Testament({ answers, draft, onRestart }) {
  const text = useMemo(() => {
    const [meet, sorry, thanks, happy, tomorrow] = answers.map(a => a.trim()).map(a => a || "まだ言葉にならない誰か");
    const draftLine = draft.trim() ? `\n\n未送信のまま残っていた言葉。\n「${draft.trim()}」` : "";
    return `自分は、成功したかったんじゃない。\n\nただ、ちゃんと誰かと生きたかった。\n\n本当は、${meet}に会いたかった。\n${sorry}に謝りたかった。\n${thanks}にありがとうを伝えたかった。\n\n一番幸せだったのは、${happy}。\n\nもし明日終わるなら、${tomorrow}。\n\nだから今日、後回しにしない。${draftLine}`;
  }, [answers, draft]);

  return (
    <div className="page">
      <p className="eyebrow">YOUR WORDS</p>
      <div className="testament">{text}</div>
      <div className="card" style={{ marginTop: 28 }}>
        <p className="message-name">つぎに</p>
        <p className="message-text">大切な人へ、いま言葉を残す。今日を後回しにしないために。</p>
      </div>
      <div className="stack" style={{ marginTop: 22 }}>
        <a className="btn primary" href="https://jaane.net?ref=last-read" target="_blank" rel="noopener" style={{ textDecoration: "none" }}>
          大切な人に言葉を残す
        </a>
        <Button onClick={onRestart}>もう一度体験する</Button>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState("intro");
  const [openedApp, setOpenedApp] = useState(null);
  const [draft, setDraft] = useState("");
  const [answers, setAnswers] = useState(Array(questions.length).fill(""));

  const restart = () => {
    setView("intro");
    setOpenedApp(null);
    setDraft("");
    setAnswers(Array(questions.length).fill(""));
  };

  const scene = storyScenes[view];

  return (
    <div className="stage">
      <div className="phone">
        <div className="screen">
          <div className="notch" />
          {scene && <StoryScene key={view} scene={scene} onDone={setView} />}
          {view === "notifications" && <NotificationScene onDone={setView} />}
          {view === "denialHome" && <DenialHome onNext={setView} onOpenApp={setOpenedApp} />}
          {view === "lonelyCall" && <LonelyCall onNext={setView} />}
          {view === "memories" && <Memories onNext={setView} />}
          {view === "unsent" && <Unsent draft={draft} setDraft={setDraft} onNext={setView} />}
          {view === "questions" && <Questions answers={answers} setAnswers={setAnswers} onNext={setView} />}
          {view === "testament" && <Testament answers={answers} draft={draft} onRestart={restart} />}
          <AppModal app={openedApp} onClose={() => setOpenedApp(null)} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
